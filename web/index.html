<!doctype html>
<html lang="en">
  <head>
    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <!-- End Single Page Apps for GitHub Pages -->

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TPJ9F0QZKH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Consent Mode: analytics cookies stay off until the visitor accepts the
      // cookie banner (see CookieConsent.tsx). gtag doesn't remember consent
      // across page loads on its own, so re-apply a previously stored choice
      // immediately, before GA actually starts.
      gtag('consent', 'default', {
        analytics_storage: 'denied',
      });
      if (localStorage.getItem('immunly_cookie_consent') === 'granted') {
        gtag('consent', 'update', { analytics_storage: 'granted' });
      }

      gtag('js', new Date());

      // send_page_view is disabled here because this is a single-page app —
      // React Router changes routes without a real page load, so the initial
      // automatic pageview wouldn't fire again on navigation. PageTransition
      // sends page_view events manually on every route change instead.
      gtag('config', 'G-TPJ9F0QZKH', { send_page_view: false });
    </script>

    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Immunly — Immunology, Simply</title>
    <meta name="description" content="Learn immunology and biomedical research through interactive lessons, landmark papers, and quizzes. Free and open access." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
